name: deployment for hive-backend

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/hive-backend-AutoDeployTrigger-b188c563-acb1-47ed-a789-f65fa7c36e92.yml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.HIVEBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.HIVEBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.HIVEBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build & Deploy Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: backend
          dockerfilePath: Dockerfile

          containerAppName: hive-backend
          resourceGroup: hive-rg

          imageToBuild: ghcr.io/ni3rav/hive-backend:${{ github.sha }}
          imageToDeploy: ghcr.io/ni3rav/hive-backend:${{ github.sha }}

          buildArguments: |
            NODE_ENV=production
