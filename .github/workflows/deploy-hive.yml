name: hive-backend-ci

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-hive.yml'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/ni3rav/hive-backend:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.HIVEBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.HIVEBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.HIVEBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App
        run: |
          az extension add --name containerapp --upgrade

          az containerapp update \
            --name hive-backend-ghcr \
            --resource-group hive-rg \
            --image ghcr.io/ni3rav/hive-backend:latest