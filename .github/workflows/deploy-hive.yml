name: hive-backend-ci

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'packages/types/**'
      - '.github/workflows/deploy-hive.yml'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Docker build setup ─────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag with both :latest AND the git SHA so Azure always pulls a new digest
      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: true
          # Inline cache speeds up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/ni3rav/hive-backend:latest
            ghcr.io/ni3rav/hive-backend:${{ github.sha }}

      # ── Deploy to Azure Container Apps ─────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.HIVEBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.HIVEBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.HIVEBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App
        run: |
          az extension add --name containerapp --upgrade --yes

          # Deploy the SHA-tagged image so Azure always pulls a fresh digest
          # (deploying :latest can silently skip re-pull if the digest hasn't changed
          #  in Azure's cache)
          az containerapp update \
            --name hive-backend-ghcr \
            --resource-group hive-rg \
            --image ghcr.io/ni3rav/hive-backend:${{ github.sha }}

      # ── Wait for the revision to become healthy ────────────────────────────
      - name: Wait for revision to be healthy
        run: |
          echo "Waiting up to 3 minutes for the new revision to go active..."
          for i in $(seq 1 18); do
            STATUS=$(az containerapp revision list \
              --name hive-backend-ghcr \
              --resource-group hive-rg \
              --query "[0].properties.healthState" -o tsv 2>/dev/null || echo "unknown")
            echo "  Attempt $i/18 — healthState: $STATUS"
            if [ "$STATUS" = "Healthy" ]; then
              echo "Revision is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Revision did not become healthy within 3 minutes."
          # Dump the last 50 log lines to help diagnose future failures
          az containerapp logs show \
            --name hive-backend-ghcr \
            --resource-group hive-rg \
            --tail 50 || true
          exit 1
