name: Deploy Azure Function - hive-thumbhash

on:
  push:
    branches:
      - main
    paths:
      - 'apps/functions/**'
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 'Install and Build'
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter functions build

      - name: Zip artifact for deployment
        working-directory: apps/functions
        run: zip -r ${{ github.workspace }}/release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact
        run: |
          unzip release.zip
          rm release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_68029D6CC1684F0B87E5CC1A242FB649 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9AEBAEC118EE4A7D9386796E3F7FBFD8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_330AA72159144179BC884D8EBB318254 }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'hive-thumbhash'
          slot-name: 'Production'
          package: '.'
